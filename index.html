<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小巴親子中醫 - 候診專屬公車動態</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: #ffffff;
      font-family: "微軟正黑體", sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .board-container {
      width: 100%;
      max-width: 800px;
      background-color: #2c2c2c;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .header h1 {
      color: #4CAF50;
      font-size: 42px;
      margin-bottom: 5px;
      text-align: center;
    }
    .header p {
      font-size: 24px;
      color: #aaaaaa;
      text-align: center;
      margin-top: 0;
      margin-bottom: 40px;
    }
    .bus-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .bus-list li {
      font-size: 36px;
      background-color: #383838;
      margin-bottom: 15px;
      padding: 20px 30px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 8px solid #4CAF50;
    }
    .route-name {
      font-weight: bold;
      color: #FFD700;
    }
    .time {
      font-weight: bold;
    }
    .coming {
      color: #FF5722;
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="board-container">
    <div class="header">
      <h1>🚌 小巴親子中醫 - 候診專屬公車動態</h1>
      <p>站牌位置：板橋花市站 (民生路二段)</p>
    </div>
    <ul id="bus-list" class="bus-list">
      <li>載入中，請稍候...</li>
    </ul>
    <div class="footer">
      資料來源：交通部 TDX 運輸資料流通服務 | 系統每 60 秒自動更新
    </div>
  </div>

  <script>
    // 🔑 請在這裡填入您的金鑰！(請保留單引號)
    const clientId = 'drsmall8.tcm-2ae397bc-9524-4141';
    const clientSecret = '1ca9badf-6dbe-47b4-8b41-4dfeceb4138c';

    async function getToken() {
      const authUrl = "https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token";
      const params = new URLSearchParams();
      params.append('grant_type', 'client_credentials');
      params.append('client_id', clientId);
      params.append('client_secret', clientSecret);
      try {
        const response = await fetch(authUrl, {
          method: 'POST',
          headers: { 'content-type': 'application/x-www-form-urlencoded' },
          body: params
        });
        const data = await response.json();
        return data.access_token;
      } catch (error) {
        console.error("無法取得 Token", error);
      }
    }

    async function getBusData() {
      const token = await getToken();
      if (!token) return;
      const apiUrl = "https://tdx.transportdata.tw/api/basic/v2/Bus/EstimatedTimeOfArrival/City/NewTaipei?$filter=StopName%2FZh_tw%20eq%20'%E6%9D%BF%E6%A9%8B%E8%8A%B1%E5%B8%82'&$orderby=RouteName%2FZh_tw&$format=JSON";
      try {
        const response = await fetch(apiUrl, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        renderBusData(data);
      } catch (error) {
        console.error("資料獲取失敗", error);
      }
    }

    function renderBusData(data) {
      const container = document.getElementById('bus-list');
      container.innerHTML = '';
      if(data.length === 0) {
         container.innerHTML = '<li>目前無公車資訊</li>';
         return;
      }
      let html = '';
      data.forEach(bus => {
        let routeName = bus.RouteName.Zh_tw;
        let time = bus.EstimateTime;
        let status = bus.StopStatus;
        let direction = bus.Direction === 0 ? "去程" : "回程";
        let timeText = "";
        if (status === 0 && time !== undefined) {
           let mins = Math.floor(time / 60);
           if (mins <= 2) {
               timeText = "<span class='time coming'>即將進站</span>";
           } else {
               timeText = `<span class='time'>約 ${mins} 分鐘</span>`;
           }
        } else if (status === 1) {
           timeText = "<span class='time'>尚未發車</span>";
        }
        if (timeText !== "" && status !== 3) {
            html += `<li>
                       <span class="route-name">${routeName}</span> 
                       <span style="font-size: 20px; color: #888;">(${direction})</span>
                       ${timeText}
                     </li>`;
        }
      });
      if(html === '') html = '<li>目前暫無即將進站的公車</li>';
      container.innerHTML = html;
    }

    getBusData();
    setInterval(getBusData, 60000);
  </script>
</body>
</html>
